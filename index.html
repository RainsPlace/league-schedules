<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; padding: 0; }
      #debug { padding: 10px; background: #ffeb3b; color: #000; text-align: center; }
      #tabs { display: flex; background-color: #0073e6; overflow-x: auto; border-bottom: 2px solid #005bb5; }
      .tab { flex: 0 0 auto; padding: 12px 20px; color: white; text-align: center; cursor: pointer; white-space: nowrap; transition: background-color 0.2s; }
      .tab:hover, .tab.active { background-color: #005bb5; }
      #infoBar { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; padding: 6px 14px; background: #f0f0f0; border-bottom: 1px solid #ddd; }
      #infoBar button { background-color: #0073e6; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; transition: background-color 0.2s; }
      #infoBar button:hover { background-color: #005bb5; }
      table { border-collapse: collapse; background: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: 10px; table-layout: auto; width: auto; }
      th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; vertical-align: top; white-space: normal; word-wrap: break-word; position: relative; overflow: hidden; }
      th { background-color: #0073e6; color: black; white-space: nowrap; font-weight: bold; }
      
      /* Calendar-specific styles */
      .calendar-table th:first-child,
      .calendar-table td:first-child { 
        width: auto;
        min-width: 180px;
        max-width: 250px;
      }
      .calendar-table th:not(:first-child),
      .calendar-table td:not(:first-child) { 
        width: auto;
        min-width: 140px;
        max-width: 200px;
      }
      
      /* Links list specific styles */
      .links-table td:first-child { 
        width: 40%; 
      }
      .links-table td:not(:first-child) { 
        width: 30%; 
      }
      
      /* Regular table styles */
      .regular-table tr:nth-child(even) { background-color: #f2f2f2; }
      .regular-table tr:hover td { background-color: #dff3ff; }
      
      /* Cell interaction styles */
      td { cursor: pointer; user-select: text; }
      td.copied { outline: 3px solid #4CAF50; outline-offset: -3px; transition: outline 0.3s ease; }
      
      /* Today column highlight */
      .today-column { box-shadow: inset 0 0 0 3px #ff9800; }
      
      #table-container { padding: 20px; overflow-x: auto; }
      #loading { text-align: center; padding: 40px; color: #555; }
      a { color: inherit; text-decoration: underline; }
      a:hover { text-decoration: underline; font-weight: bold; }
      
      .copy-button { 
        position: absolute;
        top: 2px;
        right: 2px;
        background-color: #0073e6; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        padding: 4px 10px; 
        cursor: pointer; 
        font-size: 14px; 
        opacity: 0;
        transition: opacity 0.2s, background-color 0.2s;
        z-index: 10;
      }
      td:hover .copy-button { opacity: 1; }
      .copy-button:hover { background-color: #005bb5; }
      
      /* Cell content wrapper */
      .cell-content { 
        padding-right: 35px;
        line-height: 1.4;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="debug">Loading...</div>
    <div id="tabs">
      <div class="tab" data-sheet-name="Announcements">Announcements</div>
      <div class="tab" data-sheet-name="New_York">New_York</div>
      <div class="tab" data-sheet-name="Seattle">Seattle</div>
      <div class="tab" data-sheet-name="Chicago">Chicago</div>
      <div class="tab" data-sheet-name="London">London</div>
      <div class="tab" data-sheet-name="ZAF,SWE,NLD,DEU">ZAF,SWE,NLD,DEU</div>
      <div class="tab" data-sheet-name="Australia/Sydney">Australia/Sydney</div>
      <div class="tab" data-sheet-name="españolCDT">españolCDT</div>
      <div class="tab" data-sheet-name="Deutschland">Deutschland</div>
      <div class="tab" data-sheet-name="FrancaisCanadien">FrancaisCanadien</div>
      <div class="tab" data-sheet-name="LinksList">LinksList</div>
    </div>
    <div id="infoBar">
      <div>Last updated: <span id="updatedTime">Last updated time</span>&nbsp;|&nbsp; Auto-refresh every 30 min</div>
      <div>
        <button onclick="manualRefresh()">🔄 Refresh Now</button>        
      </div>
    </div>
    <div id="table-container"><div id="loading">Select a tab to view data...</div></div>
    <script>
      let currentSheet = null;
      let currentSheetData = null;
      
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Global error:", { message, source, lineno, colno, error });
        const debugEl = document.getElementById('debug');
        if (debugEl) debugEl.textContent = `Error: ${message}`;
      };
      
      function loadSheet(sheetName) {
        console.log("loadSheet called with sheetName:", sheetName);
        const debugEl = document.getElementById('debug');
        if (debugEl) debugEl.textContent = `Loading sheet: ${sheetName || 'undefined'}`;
        
        if (!sheetName) {
          console.error("loadSheet received undefined sheetName");
          const loadingEl = document.getElementById('loading');
          if (loadingEl) loadingEl.textContent = `Error: No sheet name provided.`;
          return;
        }
        
        currentSheet = sheetName;
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.textContent = 'Loading ' + sheetName + '...';
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const activeTab = document.querySelector(`.tab[data-sheet-name="${sheetName}"]`);
        if (activeTab) activeTab.classList.add('active');
        
        console.log("Calling getSheetData with:", sheetName);
        google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFailure).getSheetData(sheetName);
      }
      
      function onSuccess(result) {
        console.log("onSuccess received:", JSON.stringify(result).substring(0, 200));
        const debugEl = document.getElementById('debug');
        if (debugEl) debugEl.textContent = `Sheet ${currentSheet} loaded successfully`;
        currentSheetData = result;
        renderTable(result);
      }
      
      function onFailure(error) {
        console.error("onFailure:", error);
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.textContent = `Error: ${error.message}`;
      }
      
      function renderTable(result) {
        console.log("RenderTable starting...");
        console.log("Result structure:", { 
          hasHeaders: !!result.headers, 
          hasRows: !!result.rows, 
          rowCount: result.rows ? result.rows.length : 0,
          headerCount: result.headers ? result.headers.length : 0
        });
        
        if (!result || !result.rows || result.rows.length === 0) {
          const loadingEl = document.getElementById('loading');
          if (loadingEl) loadingEl.textContent = `No data found or sheet is empty.`;
          return;
        }
        
        const { headers, rows, lastUpdated, isCalendar, columnWidths, rowHeights } = result;
        const updatedTimeEl = document.getElementById('updatedTime');
        if (updatedTimeEl) updatedTimeEl.textContent = lastUpdated;
        
        const tableContainer = document.getElementById('table-container');
        if (!tableContainer) {
          console.error("Table container not found!");
          return;
        }
        tableContainer.innerHTML = '';
        
        const table = document.createElement('table');
        
        if (isCalendar) {
          table.className = 'calendar-table';
        } else if (currentSheet === 'LinksList') {
          table.className = 'links-table';
        } else {
          table.className = 'regular-table';
        }
        
        const thead = table.createTHead();
        const tbody = table.createTBody();
        
        const headerRow = thead.insertRow();
        headerRow.style.height = `${rowHeights[0]}px`;
        const todayDate = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        
        headers.forEach((h, idx) => {
          const th = document.createElement('th');
          th.textContent = h.text || '';
          if (h.bgColor && h.bgColor !== '#ffffff' && h.bgColor !== '#FFFFFF') {
            th.style.backgroundColor = h.bgColor;
          }
          if (isCalendar && h.text && h.text.includes(todayDate)) {
            th.classList.add('today-column');
          }
          headerRow.appendChild(th);
        });
        
        const startRow = 0;
        rows.slice(startRow).forEach((row, rowIdx) => {
          if (!Array.isArray(row)) {
            console.error("Row is not an array:", rowIdx, row);
            return;
          }
          
          const tr = tbody.insertRow();
          tr.style.height = `${rowHeights[rowIdx + startRow]}px`;
        
          row.forEach((cellData, colIdx) => {
            const td = tr.insertCell();
            if (cellData.bgColor && cellData.bgColor !== '#ffffff' && cellData.bgColor !== '#FFFFFF') {
              td.style.backgroundColor = cellData.bgColor;
            }
            if (cellData.fontColor && cellData.fontColor !== '#000000' && cellData.fontColor !== '#000') {
              td.style.color = cellData.fontColor;
            }
            const headerText = headers[colIdx] ? headers[colIdx].text : '';
            if (isCalendar && headerText && headerText.includes(todayDate)) {
              td.classList.add('today-column');
            }
            const cellContent = document.createElement('div');
            cellContent.className = 'cell-content';
            cellContent.innerHTML = cellData.html || '';
            const copyButton = document.createElement('button');
            copyButton.className = 'copy-button';
            copyButton.textContent = 'Copy';
            copyButton.onclick = function(e) { 
              e.stopPropagation(); 
              copyCell(td); 
            };
            td.appendChild(cellContent);
            td.appendChild(copyButton);
            td.onclick = function(e) {
              if (e.target !== copyButton) {
                copyCell(td);
              }
            };
          });
        });
        
        tableContainer.appendChild(table);
      }
      
      function copyCell(cell) {
        const cellContent = cell.querySelector('.cell-content');
        if (!cellContent) return;
        const text = cellContent.textContent.trim();
        const html = cellContent.innerHTML.trim();
        const blob1 = new Blob([text], { type: 'text/plain' });
        const blob2 = new Blob([html], { type: 'text/html' });
        const data = [new ClipboardItem({
          'text/plain': blob1,
          'text/html': blob2
        })];
        navigator.clipboard.write(data).then(() => {
          cell.classList.add('copied');
          setTimeout(() => cell.classList.remove('copied'), 600);
        }).catch(err => {
          console.error('Copy failed:', err);
          navigator.clipboard.writeText(text).then(() => {
            cell.classList.add('copied');
            setTimeout(() => cell.classList.remove('copied'), 600);
          });
        });
      }
      
      function sanitize(str) { 
        if (!str) return ''; 
        return str.toString()
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;'); 
      }
      
      function manualRefresh() { 
        if (currentSheet) { 
          console.log("Manual refresh for:", currentSheet); 
          loadSheet(currentSheet); 
        } 
      }
      
      document.addEventListener('DOMContentLoaded', function() {
        console.log("DOM loaded, setting up tab click handlers");
        const debugEl = document.getElementById('debug');
        if (debugEl) debugEl.textContent = 'DOM loaded successfully';
        const tabs = document.querySelectorAll('.tab');
        console.log("Found tabs:", tabs.length);
        tabs.forEach(tab => {
          tab.addEventListener('click', function() {
            const sheetName = this.getAttribute('data-sheet-name');
            console.log("Tab clicked, sheetName from attribute:", sheetName);
            loadSheet(sheetName);
          });
        });
        const firstTab = document.querySelector('.tab');
        if (firstTab) {
          const firstSheetName = firstTab.getAttribute('data-sheet-name');
          console.log("Loading first sheet, sheetName:", firstSheetName);
          loadSheet(firstSheetName);
        } else {
          console.error("No tabs found in DOM");
        }
      });
      
      setInterval(() => { 
        if (currentSheet) loadSheet(currentSheet); 
      }, 900000);
    </script>
  </body>
</html>
